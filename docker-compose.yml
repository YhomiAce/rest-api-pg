services:
  postgres:
    image: postgres:17.1
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.1
    ports:
      - 6371:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: